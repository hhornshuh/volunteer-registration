<!-- trigger redeploy -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Volunteer Registration — Goodwill Industries of Eastern NC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ===================== CSS (UNCHANGED) ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#003d7a; --navy-mid:#0055A4; --gold:#0055A4;
  --gold-light:#ddeaf7; --white:#fff; --off-white:#f4f7fb;
  --text:#000; --text-muted:#4a4a4a; --border:#c5d8ee;
  --input-bg:#f8fafd; --success:#2f903f; --error:#DC2626;
  --radius:8px;
}
body { font-family:'DM Sans',sans-serif;background:var(--off-white);padding:40px 16px 60px; }
.page { max-width:680px;margin:0 auto; }
.header { background:#0055A4;padding:36px 40px;border-radius:12px 12px 0 0; }
.header h1 { color:#fff;font-size:36px; }
.notice-bar { margin-top:20px;background:rgba(255,255,255,.15);padding:12px;border-radius:8px;color:#fff; }
.form-body { background:#fff;padding:20px 40px;border-radius:0 0 12px 12px;border:1px solid var(--border); }
.req-note { font-size:12px;color:var(--text-muted);margin-bottom:16px; }
.field { margin-bottom:16px; }
label { font-size:12px;font-weight:600; }
.req { color:var(--error); }
input, select, textarea { width:100%;padding:10px;border-radius:8px;border:1.5px solid var(--border); }
.sig-wrap { border:1.5px solid var(--border);border-radius:8px;background:#f8fafd; }
canvas { width:100%;height:120px;cursor:crosshair; }
.btn-submit { width:100%;padding:14px;background:#0055A4;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer; }
.msg { display:none;margin-bottom:16px;padding:12px;border-radius:8px; }
.msg-error { background:#FEF2F2;color:#DC2626;border:1px solid #FECACA; }
.msg-success { background:#F0FDF4;color:#2f903f;border:1px solid #BBF7D0; }
</style>
</head>

<body>
<div class="page">

<div class="header">
  <h1>Volunteer Registration</h1>
  <div class="notice-bar"><strong>Please note:</strong> Submit form within 48 hours prior to volunteering.</div>
</div>

<div class="form-body">
<p class="req-note">Fields marked <span class="req">*</span> are required.</p>

<div id="errBox" class="msg msg-error"></div>
<div id="successBox" class="msg msg-success"></div>

<div class="field">
<label>First Name <span class="req">*</span></label>
<input id="fName">
</div>
<div class="field">
<label>Last Name <span class="req">*</span></label>
<input id="lName">
</div>
<div class="field">
<label>Phone <span class="req">*</span></label>
<input id="phone">
</div>
<div class="field">
<label>Email <span class="req">*</span></label>
<input id="email">
</div>
<div class="field">
<label>Organization <span class="req">*</span></label>
<input id="orgRep">
</div>

<label><input type="checkbox" id="ackMinor" onchange="toggleGuardian()"> I am between ages 12–15</label>

<div id="guardianSection" style="display:none;margin-top:16px;">
<label>Guardian Name <span class="req">*</span></label>
<input id="gName">
<label>Guardian Phone <span class="req">*</span></label>
<input id="gPhone">
<div class="sig-wrap">
<canvas id="gCanvas" width="600" height="70"></canvas>
</div>
<label>Guardian Signature Date <span class="req">*</span></label>
<input type="date" id="gSigDate">
</div>

<h3>Volunteer Signature <span class="req">*</span></h3>
<div class="sig-wrap">
<canvas id="volCanvas" width="600" height="80"></canvas>
</div>
<label>Signature Date <span class="req">*</span></label>
<input type="date" id="sigDate">

<div style="margin-top:24px;">
<button id="submitBtn" class="btn-submit" onclick="submitForm()">Submit Registration</button>
</div>
</div>
</div>

<script>
"use strict";

/* ================= Power Automate ================= */
const FLOW_URL = "https://default09526cd9201c42448e2c85561ffdb8.ee.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2ecdff616a304e41951c62a399400401/triggers/manual/paths/invoke?api-version=1";

/* ================= Canvas ================= */
function initCanvas(id){
  const c=document.getElementById(id); if(!c)return;
  const x=c.getContext('2d'); let d=false;
  const p=e=>{const r=c.getBoundingClientRect();const s=e.touches?e.touches[0]:e;
    return{x:(s.clientX-r.left)*c.width/r.width,y:(s.clientY-r.top)*c.height/r.height};};
  c.onmousedown=e=>{d=true;const m=p(e);x.beginPath();x.moveTo(m.x,m.y);};
  c.onmousemove=e=>{if(!d)return;const m=p(e);x.lineTo(m.x,m.y);x.stroke();};
  c.onmouseup=()=>d=false;c.onmouseleave=()=>d=false;
}
function isCanvasBlank(id){
  const c=document.getElementById(id); if(!c)return true;
  const d=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  for(let i=3;i<d.length;i+=4) if(d[i]!==0) return false;
  return true;
}

/* ================= Guardian Toggle ================= */
function toggleGuardian(){
  const chk=document.getElementById('ackMinor');
  const sec=document.getElementById('guardianSection');
  sec.style.display=chk.checked?'block':'none';
  if(chk.checked){setTimeout(()=>initCanvas('gCanvas'),50);}
}

/* ================= Init ================= */
document.addEventListener('DOMContentLoaded',()=>{
  initCanvas('volCanvas');
  document.getElementById('sigDate').value=new Date().toISOString().split('T')[0];
});

/* ================= Submit ================= */
async function submitForm(){
  const e=[]; const g=id=>document.getElementById(id)?.value.trim();
  if(!g('fName'))e.push('First Name');
  if(!g('lName'))e.push('Last Name');
  if(isCanvasBlank('volCanvas'))e.push('Signature');
  if(e.length){
    errBox.style.display='block';
    errBox.innerHTML='⚠️ Please complete: '+e.join(', ');
    return;
  }
  const payload={FName:g('fName'),LName:g('lName'),Submit:new Date().toISOString()};
  await fetch(FLOW_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  successBox.style.display='block';
  successBox.textContent='✅ Thank you! Your registration was submitted.';
}
</script>
</body>
</html>
